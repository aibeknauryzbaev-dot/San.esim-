<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ғарыштық топқа бөлу</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Comfortaa', crossorigin;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            overflow: hidden;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* Жұлдыздар мен аспан денелері */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .floating-object {
            position: absolute;
            font-size: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            z-index: 1;
            animation: orbit var(--duration) linear infinite;
            opacity: 0.4;
        }

        @keyframes orbit {
            from { transform: translate(-10vw, -10vh) rotate(0deg); }
            to { transform: translate(110vw, 110vh) rotate(360deg); }
        }

        /* Карта анимациясы */
        .planet-card {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            perspective: 1000px;
        }

        .planet-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .flipped .planet-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .floating {
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .custom-shadow {
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        /* Скроллсыз дизайн үшін */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="relative">
    <!-- Анимацияланған фон -->
    <div id="stars-container" class="fixed inset-0 pointer-events-none"></div>
    <div id="objects-container" class="fixed inset-0 pointer-events-none"></div>

    <div class="max-w-6xl mx-auto w-full relative z-10 flex flex-col h-full p-4 md:p-6">
        
        <!-- Мұғалімнің баптаулары (Бастапқы панель) -->
        <div id="setup-panel" class="bg-slate-800/80 backdrop-blur-md p-6 rounded-3xl border-2 border-sky-500/30 custom-shadow my-auto max-w-2xl mx-auto w-full max-h-[90vh] overflow-y-auto no-scrollbar">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-yellow-400">
                ⚙️ Басқару панелі
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm mb-1 text-sky-200">Оқушылар саны:</label>
                    <input type="number" id="student-count" value="24" min="2" max="100" 
                        class="w-full bg-slate-900 border-2 border-sky-400/50 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-sky-400 text-lg">
                </div>
                <div>
                    <label class="block text-sm mb-1 text-sky-200">Топтар саны:</label>
                    <select id="group-count" class="w-full bg-slate-900 border-2 border-sky-400/50 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-sky-400 text-lg">
                        <option value="2">2 топ</option>
                        <option value="3">3 топ</option>
                        <option value="4" selected>4 топ</option>
                        <option value="5">5 топ</option>
                        <option value="6">6 топ</option>
                        <option value="8">8 топ</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm text-sky-200">Топ атаулары мен смайликтері:</label>
                    <button onclick="resetToDefaults()" class="text-xs text-sky-400 hover:text-sky-300 underline">
                        Үлгіні қайтару
                    </button>
                </div>
                <div id="group-inputs" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- Топ input-тары осында динамикалық түрде қосылады -->
                </div>
            </div>

            <button onclick="initGame()" class="w-full bg-gradient-to-r from-sky-500 to-indigo-600 hover:from-sky-400 hover:to-indigo-500 text-white font-bold py-4 rounded-xl transition-all transform hover:scale-105 active:scale-95 shadow-lg uppercase tracking-wider">
                Саяхатты бастау!
            </button>
        </div>

        <!-- Ойын алаңы -->
        <div id="game-panel" class="hidden flex flex-col h-full overflow-hidden">
            
            <!-- ЖОҒАРҒЫ БӨЛІМ: Батырма және Санау -->
            <div class="flex items-center justify-between bg-slate-800/40 p-4 rounded-2xl border border-sky-500/20 mb-4 shrink-0">
                <div class="flex items-center gap-4">
                    <button onclick="handleMainAction()" id="draw-btn" class="w-24 h-24 md:w-32 md:h-32 bg-gradient-to-br from-yellow-400 to-orange-600 rounded-full flex items-center justify-center text-4xl md:text-5xl shadow-2xl hover:scale-110 active:scale-90 transition-transform cursor-pointer border-4 border-white/20 floating">
                        🎁
                    </button>
                    <div>
                        <div id="btn-label" class="text-sky-300 font-bold text-sm md:text-lg animate-pulse uppercase tracking-tighter">Батырманы бас!</div>
                        <div id="remaining-count" class="text-yellow-400 text-xs md:text-sm font-bold mt-1">
                            Қалған оқушылар: 24
                        </div>
                    </div>
                </div>
                <button onclick="showSetup()" class="text-xs text-slate-400 hover:text-white underline px-4 py-2">
                    Баптаулар
                </button>
            </div>

            <!-- ОРТАҢҒЫ БӨЛІМ: Топтар тізімі -->
            <div id="stats" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 overflow-y-auto no-scrollbar pb-4 flex-grow content-start">
                <!-- Топтар тізімі осында шығады -->
            </div>

            <!-- НӘТИЖЕ КАРТАСЫ (Оверлей) -->
            <div id="result-display" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
                <div class="planet-card w-64 h-80 md:w-80 md:h-96 relative cursor-pointer" id="planet-card" onclick="handleMainAction()">
                    <div class="planet-inner w-full h-full">
                        <div class="card-front bg-slate-800 border-4 border-dashed border-sky-400 custom-shadow">
                            <span class="text-6xl text-sky-400">?</span>
                        </div>
                        <div id="card-back-content" class="card-back border-4 border-white">
                            <div id="planet-svg" class="w-32 h-32 md:w-44 md:h-44 mb-4 flex items-center justify-center"></div>
                            <h3 id="planet-name" class="text-3xl md:text-4xl font-bold text-white mb-1">Жер</h3>
                            <p class="text-white/90 text-sm md:text-base font-bold bg-black/20 px-4 py-1 rounded-full">Сенің жаңа тобың!</p>
                            <div class="mt-4 text-xs text-white/50 animate-bounce">Жалғастыру үшін бас</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Хабарламалар -->
    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-2 rounded-full border border-sky-500 hidden z-[100] transition-opacity text-sm">
    </div>

    <script>
        // Үлгі нұсқа (default)
        const defaultPlanets = [
            { name: "Меркурий", icon: "🌑", bg: "from-gray-400 to-gray-600" },
            { name: "Шолпан", icon: "🟡", bg: "from-yellow-400 to-orange-500" },
            { name: "Жер", icon: "🌍", bg: "from-blue-400 to-green-500" },
            { name: "Марс", icon: "🔴", bg: "from-red-500 to-red-800" },
            { name: "Юпитер", icon: "🟠", bg: "from-orange-400 to-amber-700" },
            { name: "Сатурн", icon: "🪐", bg: "from-yellow-500 to-yellow-800" },
            { name: "Уран", icon: "💠", bg: "from-cyan-300 to-blue-500" },
            { name: "Нептун", icon: "🔵", bg: "from-indigo-500 to-blue-800" }
        ];

        // Ойын кезінде қолданылатын топтар тізімі
        let planets = [...defaultPlanets];

        let studentsQueue = [];
        let groupStats = {};
        let audioCtx = null;
        let isCardShowing = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSpaceSound(type) {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.exponentialRampToValueAtTime(440, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'reveal') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.5);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'success') {
                osc.type = 'sine';
                [523, 659, 783].forEach((f, i) => {
                    osc.frequency.setValueAtTime(f, now + (i * 0.1));
                });
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        function createEnvironment() {
            const stars = document.getElementById('stars-container');
            const objects = document.getElementById('objects-container');
            
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1 + 'px';
                star.style.width = size; star.style.height = size;
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                stars.appendChild(star);
            }

            const emojis = ['🪐', '☄️', '🚀', '🛸', '✨', '🌑'];
            for (let i = 0; i < 6; i++) {
                const obj = document.createElement('div');
                obj.className = 'floating-object';
                obj.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                obj.style.left = Math.random() * 100 + 'vw';
                obj.style.top = Math.random() * 100 + 'vh';
                obj.style.setProperty('--duration', (Math.random() * 25 + 25) + 's');
                obj.style.animationDelay = (Math.random() * -20) + 's';
                objects.appendChild(obj);
            }
        }

        // Топ атауларын енгізу өрістерін жаңарту
        function updateGroupInputs() {
            const gCount = parseInt(document.getElementById('group-count').value);
            const container = document.getElementById('group-inputs');
            container.innerHTML = '';

            for (let i = 0; i < gCount; i++) {
                const defaultPlanet = defaultPlanets[i];
                const div = document.createElement('div');
                div.className = 'flex gap-2';
                div.innerHTML = `
                    <input type="text" id="group-icon-${i}" value="${defaultPlanet.icon}" 
                        class="w-1/4 bg-slate-900 border-2 border-sky-400/50 rounded-xl px-2 py-2 text-white text-center focus:outline-none focus:border-sky-400 text-xl" placeholder="Смайлик">
                    <input type="text" id="group-name-${i}" value="${defaultPlanet.name}" 
                        class="w-3/4 bg-slate-900 border-2 border-sky-400/50 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-sky-400" placeholder="Топ атауы">
                `;
                container.appendChild(div);
            }
        }

        // Үлгі нұсқаны қайтару
        function resetToDefaults() {
            playSpaceSound('click');
            const gCount = parseInt(document.getElementById('group-count').value);
            for (let i = 0; i < gCount; i++) {
                document.getElementById(`group-icon-${i}`).value = defaultPlanets[i].icon;
                document.getElementById(`group-name-${i}`).value = defaultPlanets[i].name;
            }
            showToast("Үлгі нұсқа қайтарылды!");
        }

        function handleMainAction() {
            if (isCardShowing) {
                resetToNext();
            } else {
                drawGroup();
            }
        }

        function initGame() {
            playSpaceSound('success');
            const sCount = parseInt(document.getElementById('student-count').value);
            const gCount = parseInt(document.getElementById('group-count').value);

            if (isNaN(sCount) || sCount < 1) return;

            // Мұғалім енгізген топ атаулары мен смайликтерін оқу
            planets = [];
            for (let i = 0; i < gCount; i++) {
                planets.push({
                    name: document.getElementById(`group-name-${i}`).value || `Топ ${i + 1}`,
                    icon: document.getElementById(`group-icon-${i}`).value || '⭐',
                    bg: defaultPlanets[i].bg // Фон түсін үлгіден аламыз
                });
            }

            studentsQueue = [];
            groupStats = {};

            for (let i = 0; i < sCount; i++) studentsQueue.push(i % gCount);
            for (let i = studentsQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [studentsQueue[i], studentsQueue[j]] = [studentsQueue[j], studentsQueue[i]];
            }

            const statsContainer = document.getElementById('stats');
            statsContainer.innerHTML = '';
            for (let i = 0; i < gCount; i++) {
                groupStats[i] = 0;
                const p = planets[i];
                const card = document.createElement('div');
                card.className = 'bg-slate-800/80 border border-sky-400/30 p-3 rounded-2xl text-center transition-all flex flex-col items-center justify-center min-h-[100px]';
                card.id = `stat-card-${i}`;
                card.innerHTML = `
                    <div class="text-3xl mb-1">${p.icon}</div>
                    <div class="text-[10px] text-sky-300 font-bold uppercase tracking-tighter truncate w-full" title="${p.name}">${p.name}</div>
                    <div id="stat-count-${i}" class="text-2xl text-yellow-400 font-bold leading-none mt-1">0</div>
                `;
                statsContainer.appendChild(card);
            }

            updateRemaining();
            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('game-panel').classList.remove('hidden');
            resetToNext();
        }

        function drawGroup() {
            if (studentsQueue.length === 0) {
                showToast("Оқушы қалмады!");
                return;
            }

            playSpaceSound('reveal');
            const groupIndex = studentsQueue.pop();
            const planet = planets[groupIndex];

            isCardShowing = true;
            const resultDisplay = document.getElementById('result-display');
            resultDisplay.classList.remove('hidden');

            document.getElementById('planet-name').textContent = planet.name;
            document.getElementById('planet-svg').innerHTML = `<span class="text-9xl md:text-[10rem] flex items-center justify-center">${planet.icon}</span>`;
            document.getElementById('card-back-content').className = `card-back bg-gradient-to-b ${planet.bg} shadow-[0_0_60px_rgba(255,255,255,0.4)]`;

            setTimeout(() => {
                document.getElementById('planet-card').classList.add('flipped');
                playSpaceSound('success');
                groupStats[groupIndex]++;
                document.getElementById(`stat-count-${groupIndex}`).textContent = groupStats[groupIndex];
                
                document.querySelectorAll('#stats > div').forEach(d => d.classList.remove('ring-4', 'ring-white', 'scale-105', 'bg-slate-700'));
                const activeStat = document.getElementById(`stat-card-${groupIndex}`);
                activeStat.classList.add('ring-4', 'ring-white', 'scale-105', 'bg-slate-700');
                activeStat.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                
                updateRemaining();
                document.getElementById('btn-label').textContent = "Жалғастыру үшін бас";
            }, 100);
        }

        function resetToNext() {
            playSpaceSound('click');
            isCardShowing = false;
            document.getElementById('planet-card').classList.remove('flipped');
            
            setTimeout(() => {
                document.getElementById('result-display').classList.add('hidden');
                document.getElementById('btn-label').textContent = studentsQueue.length > 0 ? "Батырманы бас!" : "Бөлу аяқталды";
            }, 400);
        }

        function updateRemaining() {
            document.getElementById('remaining-count').textContent = `Оқушылар: ${studentsQueue.length}`;
        }

        function showSetup() {
            playSpaceSound('click');
            document.getElementById('setup-panel').classList.remove('hidden');
            document.getElementById('game-panel').classList.add('hidden');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // Оқиға тыңдаушылары
        document.getElementById('group-count').addEventListener('change', updateGroupInputs);
        window.onload = () => {
            createEnvironment();
            updateGroupInputs(); // Бастапқыда input-тарды толтыру
        };
    </script>
</body>
</html>
